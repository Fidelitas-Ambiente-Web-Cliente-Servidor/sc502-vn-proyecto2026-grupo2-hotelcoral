<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Hotel Coral | Administración de Comentarios</title>

    <link rel="stylesheet" href="css/HeaderStyle.css">
    <link rel="stylesheet" href="css/FooterStyle.css">
    <link rel="stylesheet" href="css/Global.css">
    <link rel="stylesheet" href="css/Comentarios.css">
    <link rel="stylesheet" href="css/AdminComentarios.css">

    <link href="https://fonts.googleapis.com/css2?family=Zain&family=Quicksand&display=swap" rel="stylesheet">

</head>

<body>

    <header id="FragmentoHeader"></header>

    <!-- PANEL ADMIN -->

    <section class="AdminPanel">

        <h1>Panel de administración de comentarios</h1>

        <p>Gestión de comentarios de los huéspedes</p>

        <div class="AdminStats">

            <div class="StatBox">
                <strong>126</strong>
                <span>Total comentarios</span>
            </div>

            <div class="StatBox">
                <strong>8</strong>
                <span>Pendientes</span>
            </div>

            <div class="StatBox">
                <strong>118</strong>
                <span>Aprobados</span>
            </div>

        </div>

    </section>

    <section class="ComentariosRecientes">

        <h2>Comentarios de huéspedes</h2>

        <div class="BarraModeracion">

            <div class="FiltrosModeracion">
                <button onclick="Filtrar('PENDIENTE')">Pendientes</button>
                <button onclick="Filtrar('APROBADO')">Aprobados</button>
                <button onclick="Filtrar('SPAM')">Spam</button>
                <button onclick="Filtrar('TODOS')">Todos</button>
            </div>

        </div>


        <div id="ListaAdminComentarios"></div>


    </section>

    <footer id="FragmentoFooter"></footer>

    <script src="js/CargarFragmento.js"></script>
    <script src="js/Header.js"></script>
    <script src="js/Admin/AdminComentarios.js"></script>

</body>

</html>
